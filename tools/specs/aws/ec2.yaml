# AWS EC2 instance health from CloudWatch via the Prometheus cloudwatch_exporter.
title: AWS / EC2 (CloudWatch)
description: >-
  CPU utilisation, network throughput, instance status checks and EBS IO credit
  balance for EC2 instances exported from CloudWatch. Answers "are any instances
  failing their status checks or running hot, and is burst credit draining?"
  rather than just charting average CPU.
datasource: prometheus
tags: [aws, ec2, cloudwatch, cloud, capacity]
seo_phrase: AWS EC2 CloudWatch Grafana dashboard
refresh: 1m
time_from: now-6h

questions:
  - "Are any instances failing their EC2 status checks right now?"
  - "Which instances are running hottest on CPU?"
  - "How many instances are above my CPU threshold?"
  - "Is EBS burst-balance (IOPS credits) draining toward zero?"
  - "Is network in/out spiking on any instance?"

production_lessons: >-
  CloudWatch metrics are coarse (1–5 min) and pre-aggregated, so this dashboard is
  built for triage, not millisecond debugging. The two signals that actually page
  are **status-check failures** (the instance or its host is unhealthy and may need
  a stop/start) and **EBS IO credit depletion** on gp2/burstable volumes — when
  `BurstBalance`/IO-balance hits zero, disk latency spikes and the app stalls even
  though CPU looks fine. We lead with both, plus a top-N of CPU so you can spot the
  busy instances at a glance. Because the exporter samples CloudWatch on a delay,
  alert `for:` windows are deliberately generous.

data_sources:
  - "`cloudwatch_exporter` (the Prometheus CloudWatch exporter) scraping the
    `AWS/EC2` and `AWS/EBS` namespaces (`aws_ec2_cpuutilization_average`,
    `aws_ec2_network_in_average`, `aws_ec2_network_out_average`,
    `aws_ec2_status_check_failed_sum`, `aws_ec2_disk_read_bytes_average`,
    `aws_ec2_ebsio_balance_average`)."
  - "**Naming assumption:** the exporter lower-cases the metric and turns the
    CloudWatch `InstanceId` dimension into the label `instance_id`. If your config
    keeps `dimension_InstanceId`, adjust the label name in the queries and template
    variable. Network/disk `_average` values are per the configured CloudWatch
    period (default 300s), expressed in bytes."

templating:
  - name: job
    label: Job
    query: label_values(aws_ec2_cpuutilization_average, job)
    description: Prometheus scrape job for your cloudwatch_exporter.
    multi: false
    includeAll: false
  - name: instance_id
    label: Instance
    query: label_values(aws_ec2_cpuutilization_average{job="$job"}, instance_id)
    description: EC2 instance(s) to display; supports multi-select.
    multi: true
    includeAll: true

rows:
  - title: Fleet health — read these first
    panels:
      - type: stat
        title: Status check failures
        description: Sum of failed EC2 status checks across the selection. Anything above zero is actionable.
        unit: short
        decimals: 0
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: red, value: 1}
        targets:
          - expr: sum(aws_ec2_status_check_failed_sum{job="$job", instance_id=~"$instance_id"}) or vector(0)
            instant: true
            legend: failed
      - type: stat
        title: Busiest instance CPU
        description: Highest CPU utilisation across the selected instances.
        unit: percent
        min: 0
        max: 100
        colorMode: value
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 80}
          - {color: red, value: 90}
        targets:
          - expr: max(aws_ec2_cpuutilization_average{job="$job", instance_id=~"$instance_id"}) or vector(0)
            instant: true
            legend: max cpu
      - type: stat
        title: Instances over 80% CPU
        description: Count of instances whose CPU is above 80% right now.
        unit: short
        decimals: 0
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 1}
          - {color: red, value: 5}
        targets:
          - expr: count(aws_ec2_cpuutilization_average{job="$job", instance_id=~"$instance_id"} > 80) or vector(0)
            instant: true
            legend: hot
      - type: stat
        title: Lowest EBS IO balance
        description: Lowest EBS IO burst-credit balance across the selection. Near zero means imminent IO throttling.
        unit: percent
        min: 0
        max: 100
        colorMode: background
        thresholds:
          - {color: red, value: null}
          - {color: yellow, value: 20}
          - {color: green, value: 50}
        targets:
          - expr: min(aws_ec2_ebsio_balance_average{job="$job", instance_id=~"$instance_id"}) or vector(100)
            instant: true
            legend: min balance

  - title: CPU utilisation
    panels:
      - type: bargauge
        title: Top 10 instances by CPU
        description: The hottest instances right now — your candidates for scaling or right-sizing.
        unit: percent
        min: 0
        max: 100
        orientation: horizontal
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 80}
          - {color: red, value: 90}
        targets:
          - expr: topk(10, aws_ec2_cpuutilization_average{job="$job", instance_id=~"$instance_id"})
            instant: true
            legend: "{{instance_id}}"
      - type: timeseries
        title: CPU utilisation per instance
        description: Per-instance CPU over time. CloudWatch averages hide short spikes — read trends, not microbursts.
        unit: percent
        min: 0
        max: 100
        legend: table
        thresholdsStyle: dashed
        thresholds:
          - {color: green, value: null}
          - {color: red, value: 90}
        targets:
          - expr: aws_ec2_cpuutilization_average{job="$job", instance_id=~"$instance_id"}
            legend: "{{instance_id}}"

  - title: Network & disk
    panels:
      - type: timeseries
        title: Network in/out
        description: Bytes in and out per CloudWatch period, summed across the selection.
        unit: bytes
        min: 0
        legend: table
        targets:
          - expr: sum(aws_ec2_network_in_average{job="$job", instance_id=~"$instance_id"})
            legend: in
          - expr: sum(aws_ec2_network_out_average{job="$job", instance_id=~"$instance_id"})
            legend: out
      - type: timeseries
        title: EBS disk read bytes per instance
        description: Per-instance EBS read volume — correlate spikes with IO-balance drops.
        unit: bytes
        min: 0
        legend: table
        targets:
          - expr: aws_ec2_disk_read_bytes_average{job="$job", instance_id=~"$instance_id"}
            legend: "{{instance_id}}"

  - title: Burst credits & status
    panels:
      - type: timeseries
        title: EBS IO balance per instance
        description: EBS IO burst-credit balance over time. A steady decline toward zero predicts IO throttling.
        unit: percent
        min: 0
        max: 100
        legend: table
        thresholdsStyle: dashed
        thresholds:
          - {color: green, value: null}
          - {color: red, value: 20}
        targets:
          - expr: aws_ec2_ebsio_balance_average{job="$job", instance_id=~"$instance_id"}
            legend: "{{instance_id}}"
      - type: timeseries
        title: Status check failures per instance
        description: Failed status checks per instance over time — a sustained 1 means the instance needs a stop/start or replacement.
        unit: short
        min: 0
        legend: table
        targets:
          - expr: aws_ec2_status_check_failed_sum{job="$job", instance_id=~"$instance_id"}
            legend: "{{instance_id}}"

alerts:
  - name: Ec2StatusCheckFailed
    severity: critical
    expr: aws_ec2_status_check_failed_sum > 0
    for: 5m
    summary: "EC2 instance {{ $labels.instance_id }} failing status checks"
    why: A failed status check means the instance or its underlying host is unhealthy — the workload is likely down or unreachable.
    investigate: "Open AWS / EC2; determine whether it is a system check (AWS host) or instance check (guest OS) failure in the console."
    runbook: "For a system-check failure, stop/start the instance to move it to healthy hardware; for an instance-check failure, fix the guest (disk full, network, kernel) or replace via the ASG."
    recovery: Clears when status checks pass for 5m.
    false_positives: A reboot you initiated will briefly fail the check; the 5m `for` covers normal reboots.
  - name: Ec2HighCPU
    severity: warning
    expr: aws_ec2_cpuutilization_average > 90
    for: 15m
    summary: "EC2 instance {{ $labels.instance_id }} CPU >90%"
    why: Sustained high CPU means the instance is undersized for its load and will start dropping or delaying work.
    investigate: "Check whether it is steady-state or a burst; review the instance type and any autoscaling policy."
    runbook: "Scale the instance type up, add instances behind the load balancer/ASG, or move work off the box."
    recovery: Clears when CPU falls below 90% for 10m.
    false_positives: Batch/ETL instances that are meant to run pinned — scope the rule by tag/instance_id.
  - name: Ec2EBSIOBalanceLow
    severity: warning
    expr: aws_ec2_ebsio_balance_average < 20
    for: 10m
    summary: "EC2 instance {{ $labels.instance_id }} EBS IO balance <20%"
    why: Burstable EBS volumes throttle hard once credits run out, spiking disk latency while CPU still looks healthy — a confusing, app-stalling failure.
    investigate: "Identify the volume and its workload; check disk read/write panels for the IO that is burning credits."
    runbook: "Switch the volume to gp3 (baseline IOPS, no credits) or io1/io2, or provision a larger gp2 volume for more baseline IOPS."
    recovery: Clears when IO balance recovers above 20% for 10m.
    false_positives: A one-off bulk job (backup, import) can dip the balance briefly — the 10m `for` filters short bursts.

troubleshooting:
  - symptom: All panels "No data"
    cause: Wrong label name, or the exporter isn't pulling the AWS/EC2 namespace.
    action: "Confirm `aws_ec2_cpuutilization_average` exists in Explore; check whether the dimension label is `instance_id` or `dimension_InstanceId` and update the queries."
  - symptom: Network values look tiny or huge
    cause: CloudWatch reports bytes per period, not per second.
    action: Divide by your configured `period_seconds` if you want a true bytes/sec, and switch the unit to `Bps`.
  - symptom: EBS IO balance always 100
    cause: The volumes are gp3/io2 (no burst credits) or the AWS/EBS namespace isn't scraped.
    action: This is expected for non-burstable volumes; remove the panel or scope it to gp2 volumes.

performance: >-
  CloudWatch granularity is 1–5 minutes, so a 1m dashboard refresh and 6h window
  match the data without extra API cost — every scrape is a paid GetMetricData
  call, so don't over-refresh. Top-N and counts bound series with `topk`/`count`.
  Use metric-math or a wider period in the exporter config to reduce CloudWatch
  cost on large fleets.

customization: >-
  Adjust the 80%/90% CPU thresholds and the 20% IO-balance floor to your instance
  types. To watch one application, scope `$instance_id` with a regex on your
  naming convention, or add a tag-based dimension in the exporter so you can filter
  by environment. Add `aws_ec2_status_check_failed_instance_sum` /
  `_system_sum` panels if you split the two check types.
