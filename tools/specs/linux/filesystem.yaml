# Filesystem capacity for a fleet of Linux hosts scraped by node_exporter.
uid: linux-filesystem
title: Linux / Filesystem
description: >-
  Filesystem capacity and exhaustion risk for Linux hosts scraped by node_exporter:
  used percent, bytes free, inode headroom, read-only mounts, and a linear
  prediction of time-to-full. Answers "which mount will fill first and when?"
  rather than just showing current usage.
datasource: prometheus
tags: [linux, filesystem, capacity, node-exporter]
seo_phrase: Node Exporter filesystem Grafana dashboard
refresh: 30s
time_from: now-6h

questions:
  - "Which filesystem is fullest right now?"
  - "Which mount is predicted to run out of space first, and how soon?"
  - "Are we about to exhaust inodes even though bytes look fine?"
  - "Did any filesystem flip to read-only (a sign of underlying disk errors)?"

production_lessons: >-
  Disk-full incidents almost never surprise you on the byte axis alone — they surprise you
  because (a) inodes ran out while gigabytes remained free, or (b) usage was climbing
  linearly and nobody projected it forward. So this dashboard leads with the fullest mount,
  a **predict_linear time-to-full**, and an explicit **inodes-free** panel. The
  read-only-mount count is the quiet killer: when the kernel remounts a filesystem
  read-only after IO errors, applications fail in confusing ways long before anyone checks
  `dmesg`. Alert on the *prediction*, not the current value — a 70% disk filling at 5%/hour
  needs action now, while a stable 95% disk does not.

data_sources:
  - "`node_exporter` `filesystem` collector (`node_filesystem_avail_bytes`,
    `node_filesystem_size_bytes`, `node_filesystem_files`, `node_filesystem_files_free`,
    `node_filesystem_readonly`)."

templating:
  - name: job
    label: Job
    query: label_values(node_uname_info, job)
    description: Prometheus scrape job for your node_exporter targets.
    multi: false
    includeAll: false
  - name: instance
    label: Instance
    query: label_values(node_uname_info{job="$job"}, instance)
    description: Host(s) to display; supports multi-select.
    multi: true
    includeAll: true

rows:
  - title: Exhaustion risk — read these first
    panels:
      - type: gauge
        title: Fullest filesystem
        description: Highest used percentage across all real (non-pseudo) filesystems on selected hosts.
        unit: percent
        min: 0
        max: 100
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 80}
          - {color: red, value: 90}
        targets:
          - expr: >-
              max(100 * (1 - node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
              / node_filesystem_size_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"})) or vector(0)
            instant: true
            legend: fullest
      - type: stat
        title: Soonest predicted full
        description: Shortest predicted time to 0 bytes free across mounts, from a linear fit over the last 6h. Empty means nothing is trending to full.
        unit: s
        decimals: 0
        colorMode: background
        thresholds:
          - {color: red, value: null}
          - {color: yellow, value: 86400}
          - {color: green, value: 604800}
        targets:
          - expr: >-
              min(
                node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
                / clamp_min(-deriv(node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[6h]), 1)
                and deriv(node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[6h]) < 0
              ) or vector(604800)
            instant: true
            legend: soonest full
      - type: stat
        title: Read-only mounts
        description: Count of filesystems currently mounted read-only — often the result of underlying disk IO errors.
        unit: short
        decimals: 0
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: red, value: 1}
        targets:
          - expr: >-
              sum(node_filesystem_readonly{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"} == 1) or vector(0)
            instant: true
            legend: read-only
      - type: stat
        title: Lowest inodes free
        description: Smallest free-inode percentage across mounts. Inode exhaustion fails writes even with bytes to spare.
        unit: percent
        min: 0
        max: 100
        colorMode: value
        thresholds:
          - {color: red, value: null}
          - {color: yellow, value: 10}
          - {color: green, value: 25}
        targets:
          - expr: >-
              min(100 * node_filesystem_files_free{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
              / clamp_min(node_filesystem_files{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}, 1)) or vector(100)
            instant: true
            legend: min inodes free

  - title: Capacity by mount
    panels:
      - type: bargauge
        title: Used % by mount
        description: Ranked filesystem usage. The bars to watch are the ones over 80%.
        unit: percent
        min: 0
        max: 100
        orientation: horizontal
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 80}
          - {color: red, value: 90}
        targets:
          - expr: >-
              100 * (1 - node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
              / node_filesystem_size_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"})
            instant: true
            legend: "{{instance}} {{mountpoint}}"
      - type: timeseries
        title: Bytes free by mount
        description: Absolute free space over time — the slope is what predict_linear extrapolates.
        unit: bytes
        min: 0
        legend: table
        targets:
          - expr: node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
            legend: "{{instance}} {{mountpoint}}"

  - title: Inodes and prediction
    panels:
      - type: timeseries
        title: Inodes free % by mount
        description: Free inodes as a percentage. Filesystems with millions of tiny files exhaust inodes first.
        unit: percent
        min: 0
        max: 100
        legend: table
        thresholdsStyle: dashed
        thresholds:
          - {color: green, value: null}
          - {color: red, value: 10}
        targets:
          - expr: >-
              100 * node_filesystem_files_free{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
              / clamp_min(node_filesystem_files{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}, 1)
            legend: "{{instance}} {{mountpoint}}"
      - type: table
        title: Predicted time to full (hours)
        description: Mounts whose free space is trending down, with the linear-fit hours until empty. Sorted soonest first.
        unit: short
        decimals: 1
        sortBy:
          - {displayName: Value, desc: false}
        targets:
          - expr: >-
              (
                node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
                / clamp_min(-deriv(node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[6h]), 1)
              ) / 3600
              and deriv(node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[6h]) < 0
            instant: true
            format: table
            legend: hours to full

alerts:
  - name: HostFilesystemPredictedFull
    severity: warning
    expr: >-
      predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[6h], 24 * 3600) < 0
      and node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"} > 0
    for: 30m
    summary: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} predicted full within 24h"
    why: A linear fit projects this mount hitting 0 bytes within a day; acting on the trend gives you hours of lead time instead of a 3am page.
    investigate: "Open Linux / Filesystem, find the mount in the predicted-full table, and check what is writing (du -x, ncdu, log/backup growth)."
    runbook: "Rotate or ship logs, prune old artifacts/images, expand the volume, or move data off the mount. Re-check the slope afterwards."
    recovery: Clears once the projection no longer reaches 0 within 24h (after cleanup or expansion).
    false_positives: Steady-state churn (a mount that fills then gets cleaned on a cycle) can trip the linear fit — widen the fit window or raise `for`.
  - name: HostFilesystemAlmostFull
    severity: critical
    expr: >-
      100 * (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
      / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}) > 95
    for: 5m
    summary: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} over 95% full"
    why: Past ~95% many filesystems slow down (fragmentation, reserved-block limits) and writes start failing — databases and logs are the first to break.
    investigate: "Identify the largest consumers on the mount and whether usage is still climbing on the bytes-free panel."
    runbook: "Free space immediately (logs, temp, old releases) or expand the volume; for root mounts, clear the package cache and journal first."
    recovery: Clears when usage drops below 95% for 5m.
    false_positives: Filesystems with large reserved-block percentages report high used% while still writable — tune the threshold per mount.
  - name: HostFilesystemReadOnly
    severity: critical
    expr: node_filesystem_readonly{fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"} == 1
    for: 2m
    summary: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is read-only"
    why: The kernel typically remounts a filesystem read-only after IO errors; every write now fails, often silently corrupting application state.
    investigate: "Check dmesg / journalctl -k for IO or EXT4/XFS errors on the underlying device; inspect SMART/cloud-volume health."
    runbook: "Fsck or replace the failing device, restore from snapshot if corrupted, and remount read-write only after the underlying fault is fixed."
    recovery: Clears when the filesystem is remounted read-write.
    false_positives: Intentionally read-only mounts (read-only root, immutable images) — exclude those mountpoints from the rule.

troubleshooting:
  - symptom: Predicted-full table is empty
    cause: No mount has a negative slope over the fit window, so the `< 0` filter drops everything.
    action: Expected when nothing is filling; widen the window or check the bytes-free panel for slow trends.
  - symptom: Used % seems high but df disagrees
    cause: Reserved blocks (default 5% on ext4) count toward size but not avail.
    action: This matches df's behaviour for non-root users; compare against `df` run as root if in doubt.
  - symptom: Container/overlay mounts cluttering the view
    cause: overlay/tmpfs/fuse filesystems are ephemeral and not capacity-managed.
    action: They are excluded by the `fstype!~` filter; adjust the regex if your real storage uses one of those types.

performance: >-
  Capacity gauges read the latest sample (instant queries). The prediction uses
  `deriv(...[6h])` and `predict_linear(...[6h])`, which scan 6h of samples per mount — keep
  the fit window proportional to your retention and avoid pointing this at extreme
  per-container filesystem cardinality. The `clamp_min(...,1)` guards stop divide-by-zero on
  empty or zero-inode filesystems.

customization: >-
  Adjust the `fstype!~` regex to match the filesystems you actually manage. Tune the 24h
  prediction horizon and the 90/95% thresholds to your provisioning lead time. Swap the 6h
  fit window for 24h on slowly-growing volumes to reduce noise from short bursts.
