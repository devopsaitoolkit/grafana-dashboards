# Process and scheduler activity for Linux hosts scraped by node_exporter.
uid: linux-processes
title: Linux / Processes
description: >-
  Process and scheduler activity for Linux hosts scraped by node_exporter: context
  switches and forks per second, runnable vs blocked process counts, and
  file-descriptor exhaustion. Answers "is the scheduler thrashing or are we running
  out of file descriptors?" rather than drawing raw counters.
datasource: prometheus
tags: [linux, processes, scheduler, node-exporter]
seo_phrase: Node Exporter processes Grafana dashboard
refresh: 30s
time_from: now-6h

questions:
  - "Are we close to exhausting system-wide file descriptors?"
  - "Is the scheduler context-switching far more than usual (lock contention, oversubscription)?"
  - "Is something fork-bombing — a runaway fork/exec rate?"
  - "How many processes are runnable vs blocked right now?"

production_lessons: >-
  Two quiet exhaustion modes take down healthy-looking hosts, and this dashboard leads with
  the worse one: **file-descriptor exhaustion**. When `node_filefd_allocated` approaches
  `node_filefd_maximum`, every `open()`/`accept()` fails with EMFILE/ENFILE and services
  start refusing connections while CPU and memory look fine. The second signal is the
  **context-switch rate**: a sudden 5–10× jump usually means lock contention, a tight
  spin-poll loop, or CPU oversubscription, and it burns cycles in the kernel rather than
  your app. A climbing **fork rate** is the fingerprint of a fork bomb or a misbehaving
  supervisor restarting a crashing process in a loop. None of these show up on a plain CPU
  graph, which is why they get their own dashboard.

data_sources:
  - "`node_exporter` `stat` collector (`node_context_switches_total`, `node_forks_total`,
    `node_procs_running`, `node_procs_blocked`)."
  - "`node_exporter` `filefd` collector (`node_filefd_allocated`, `node_filefd_maximum`)."

templating:
  - name: job
    label: Job
    query: label_values(node_uname_info, job)
    description: Prometheus scrape job for your node_exporter targets.
    multi: false
    includeAll: false
  - name: instance
    label: Instance
    query: label_values(node_uname_info{job="$job"}, instance)
    description: Host(s) to display; supports multi-select.
    multi: true
    includeAll: true

rows:
  - title: Exhaustion — read these first
    panels:
      - type: gauge
        title: Max file descriptors used
        description: Highest system-wide file-descriptor utilisation across hosts. At 100% every open() fails with ENFILE.
        unit: percent
        min: 0
        max: 100
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 70}
          - {color: red, value: 90}
        targets:
          - expr: >-
              max(100 * node_filefd_allocated{job="$job", instance=~"$instance"}
              / clamp_min(node_filefd_maximum{job="$job", instance=~"$instance"}, 1)) or vector(0)
            instant: true
            legend: max fd used
      - type: stat
        title: Blocked processes
        description: Processes in uninterruptible sleep across the fleet — IO-bound backlog.
        unit: short
        decimals: 0
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 5}
          - {color: red, value: 20}
        targets:
          - expr: sum(node_procs_blocked{job="$job", instance=~"$instance"}) or vector(0)
            instant: true
            legend: blocked
      - type: stat
        title: Context switches/s
        description: Fleet context-switch rate. A sudden multiple of the baseline signals contention or oversubscription.
        unit: ops
        decimals: 0
        colorMode: value
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 100000}
          - {color: red, value: 500000}
        targets:
          - expr: sum(rate(node_context_switches_total{job="$job", instance=~"$instance"}[5m])) or vector(0)
            instant: true
            legend: ctxt/s
      - type: stat
        title: Forks/s
        description: Fleet process-creation rate. A sustained climb is a fork bomb or a crash-restart loop.
        unit: ops
        decimals: 1
        colorMode: value
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 200}
          - {color: red, value: 1000}
        targets:
          - expr: sum(rate(node_forks_total{job="$job", instance=~"$instance"}[5m])) or vector(0)
            instant: true
            legend: forks/s

  - title: File descriptors
    panels:
      - type: timeseries
        title: File descriptors used % per host
        description: Per-host allocated ÷ maximum file descriptors. Watch for a steady climb (an fd leak).
        unit: percent
        min: 0
        max: 100
        legend: table
        thresholdsStyle: dashed
        thresholds:
          - {color: green, value: null}
          - {color: red, value: 90}
        targets:
          - expr: >-
              100 * node_filefd_allocated{job="$job", instance=~"$instance"}
              / clamp_min(node_filefd_maximum{job="$job", instance=~"$instance"}, 1)
            legend: "{{instance}}"
      - type: bargauge
        title: Top hosts by fd usage
        description: Ranked file-descriptor utilisation — the hosts closest to the limit first.
        unit: percent
        min: 0
        max: 100
        orientation: horizontal
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 70}
          - {color: red, value: 90}
        targets:
          - expr: >-
              topk(10, 100 * node_filefd_allocated{job="$job", instance=~"$instance"}
              / clamp_min(node_filefd_maximum{job="$job", instance=~"$instance"}, 1))
            instant: true
            legend: "{{instance}}"

  - title: Scheduler activity
    panels:
      - type: timeseries
        title: Context switches per host
        description: Per-host context-switch rate. Correlate spikes with CPU system time and lock contention.
        unit: ops
        min: 0
        legend: table
        targets:
          - expr: rate(node_context_switches_total{job="$job", instance=~"$instance"}[5m])
            legend: "{{instance}}"
      - type: timeseries
        title: Fork rate per host
        description: Per-host process-creation rate. A flat baseline with sudden spikes points at a restart loop.
        unit: ops
        min: 0
        legend: table
        targets:
          - expr: rate(node_forks_total{job="$job", instance=~"$instance"}[5m])
            legend: "{{instance}}"

  - title: Process states
    panels:
      - type: timeseries
        title: Runnable vs blocked (fleet)
        description: Runnable (CPU-ready) vs blocked (IO-wait) process counts over time.
        unit: short
        min: 0
        legend: table
        targets:
          - expr: sum(node_procs_running{job="$job", instance=~"$instance"})
            legend: runnable
          - expr: sum(node_procs_blocked{job="$job", instance=~"$instance"})
            legend: blocked

alerts:
  - name: HostFileDescriptorsExhausting
    severity: critical
    expr: >-
      100 * node_filefd_allocated / clamp_min(node_filefd_maximum, 1) > 90
    for: 10m
    summary: "Host {{ $labels.instance }} file descriptors > 90% of the system limit"
    why: Near the file-max limit, new opens, sockets and accepts fail with ENFILE/EMFILE — services refuse connections while CPU and memory look healthy.
    investigate: "Find the top fd holders (ls /proc/*/fd | wc / lsof | awk); a steady climb on the per-host panel is an fd leak."
    runbook: "Restart or fix the leaking process; raise `fs.file-max` and per-process `LimitNOFILE` only as a stopgap, not a fix for a leak."
    recovery: Clears when fd utilisation falls below 90% for 5m.
    false_positives: Hosts that legitimately hold many fds (large connection pools) — size file-max for them and tune the threshold.
  - name: HostContextSwitchStorm
    severity: warning
    expr: >-
      rate(node_context_switches_total[5m])
      > 5 * avg_over_time(rate(node_context_switches_total[5m])[1h:5m])
    for: 10m
    summary: "Host {{ $labels.instance }} context-switch rate 5× its hourly baseline"
    why: A context-switch storm burns CPU in the scheduler instead of the application and usually signals lock contention or CPU oversubscription.
    investigate: "Correlate with CPU system time and run queue; use perf/pidstat -w to find the thrashing process."
    runbook: "Reduce contention (fix locking, pin threads, lower thread-pool sizes) or relieve oversubscription by moving workloads off the host."
    recovery: Clears when the rate returns to within 5× of baseline for 5m.
    false_positives: Legitimate workload ramps that raise the baseline; the self-relative comparison tolerates gradual growth.
  - name: HostForkRateHigh
    severity: warning
    expr: rate(node_forks_total[5m]) > 1000
    for: 5m
    summary: "Host {{ $labels.instance }} forking > 1000 procs/s"
    why: A runaway fork rate is the signature of a fork bomb or a crash-restart loop that exhausts PIDs and CPU.
    investigate: "Identify the parent spawning children (ps --forest, journalctl for a flapping unit); check PID usage."
    runbook: "Stop or fix the offending supervisor/script; apply a cgroup `pids.max` limit to contain it."
    recovery: Clears when the fork rate drops below 1000/s for 5m.
    false_positives: Build farms and CI runners that spawn many short-lived processes by design — scope by role.

troubleshooting:
  - symptom: fd usage panel shows "No data"
    cause: The filefd collector is disabled.
    action: Enable the node_exporter filefd collector; confirm `node_filefd_allocated` exists in Explore.
  - symptom: Context-switch baseline alert never fires
    cause: The 1h self-baseline absorbs slow, sustained growth.
    action: Add a static ceiling alert alongside the relative one if you need an absolute cap.
  - symptom: Fork rate is always near zero
    cause: Workloads use long-lived threads, not processes.
    action: Normal for thread-based servers; the fork panel matters most for process-per-request and supervisor patterns.

performance: >-
  Rates use a 5m window (≥4× a 15s scrape). The context-switch baseline alert uses a
  subquery (`[1h:5m]`) which is heavier than a plain rate — keep it scoped and avoid running
  it across thousands of hosts at once. fd and process gauges are cheap instant reads.

customization: >-
  Tune the 90% fd threshold and the 1000 forks/s ceiling to your workload. Replace the
  relative context-switch baseline with an absolute number if your fleet is homogeneous.
  Scope `$instance` by role to separate build/CI hosts from request-serving ones.
