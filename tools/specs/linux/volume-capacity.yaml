# Storage volume capacity and growth for Linux hosts scraped by node_exporter.
uid: linux-volume-capacity
title: Linux / Volume Capacity
description: >-
  Storage capacity-planning view across mounted volumes for Linux hosts scraped by
  node_exporter: free headroom, growth rate, days-to-full per mount, and the largest
  volumes. Answers "which volume runs out first and how much runway do we have?" —
  the planning companion to the operational Filesystem dashboard.
datasource: prometheus
tags: [linux, storage, capacity, planning, node-exporter]
seo_phrase: Node Exporter volume capacity Grafana dashboard
refresh: 1m
time_from: now-7d

questions:
  - "How many volumes have less than 10% free right now?"
  - "Which mount will fill first, and roughly how many days away is it?"
  - "How fast is each volume growing (bytes/day)?"
  - "Which mounts are the largest consumers of provisioned storage?"

production_lessons: >-
  Capacity planning fails on the wrong time axis: the operational filesystem alert fires at
  90% with hours to spare, but procurement and volume-expansion lead times are measured in
  days. So this dashboard runs on a **7-day window** and leads with **how many volumes are
  under 10% free** and **which one fills soonest**, computed from a linear fit of the growth
  trend. The most useful planning panel is days-to-full per mount, because it turns "/data
  is 82% full" — which sounds fine — into "/data fills in 4 days", which gets a change
  approved. Growth rate (the deriv) is the early-warning signal: a mount whose slope just
  doubled deserves attention long before it crosses any percentage threshold.

data_sources:
  - "`node_exporter` `filesystem` collector (`node_filesystem_avail_bytes`,
    `node_filesystem_size_bytes`). Use a fit window proportional to your retention so the
    growth trend is stable."

templating:
  - name: job
    label: Job
    query: label_values(node_uname_info, job)
    description: Prometheus scrape job for your node_exporter targets.
    multi: false
    includeAll: false
  - name: instance
    label: Instance
    query: label_values(node_uname_info{job="$job"}, instance)
    description: Host(s) to display; supports multi-select.
    multi: true
    includeAll: true

rows:
  - title: Runway — read these first
    panels:
      - type: stat
        title: Volumes under 10% free
        description: Count of real volumes with less than 10% free space across selected hosts.
        unit: short
        decimals: 0
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 1}
          - {color: red, value: 3}
        targets:
          - expr: >-
              count(
                node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
                / node_filesystem_size_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"} < 0.10
              ) or vector(0)
            instant: true
            legend: under 10%
      - type: stat
        title: Soonest to fill (days)
        description: Fewest days to 0 bytes free across mounts, from a 7-day linear fit. High is good.
        unit: short
        decimals: 1
        colorMode: background
        thresholds:
          - {color: red, value: null}
          - {color: yellow, value: 7}
          - {color: green, value: 30}
        targets:
          - expr: >-
              min(
                (
                  node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
                  / clamp_min(-deriv(node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[7d]), 1)
                ) / 86400
                and deriv(node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[7d]) < 0
              ) or vector(365)
            instant: true
            legend: soonest days
      - type: stat
        title: Total provisioned
        description: Sum of provisioned capacity across all selected real volumes.
        unit: bytes
        decimals: 1
        colorMode: value
        thresholds:
          - {color: green, value: null}
        targets:
          - expr: >-
              sum(node_filesystem_size_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}) or vector(0)
            instant: true
            legend: provisioned
      - type: stat
        title: Total free
        description: Sum of free space across all selected real volumes.
        unit: bytes
        decimals: 1
        colorMode: value
        thresholds:
          - {color: green, value: null}
        targets:
          - expr: >-
              sum(node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}) or vector(0)
            instant: true
            legend: free

  - title: Days to full
    panels:
      - type: table
        title: Days to full by mount
        description: Volumes whose free space is trending down, with the linear-fit days until empty. Sorted soonest first.
        unit: short
        decimals: 1
        height: 10
        sortBy:
          - {displayName: Value, desc: false}
        targets:
          - expr: >-
              (
                node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
                / clamp_min(-deriv(node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[7d]), 1)
              ) / 86400
              and deriv(node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[7d]) < 0
            instant: true
            format: table
            legend: days to full

  - title: Growth and size
    panels:
      - type: bargauge
        title: Growth rate by mount (bytes/day)
        description: Daily growth from the 7-day fit. Positive bars are filling; the fastest growers need attention first.
        unit: bytes
        orientation: horizontal
        targets:
          - expr: >-
              topk(10, -deriv(node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[7d]) * 86400)
            instant: true
            legend: "{{instance}} {{mountpoint}}"
      - type: bargauge
        title: Largest volumes (provisioned)
        description: Ranked provisioned capacity — where the storage spend is concentrated.
        unit: bytes
        orientation: horizontal
        targets:
          - expr: >-
              topk(10, node_filesystem_size_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"})
            instant: true
            legend: "{{instance}} {{mountpoint}}"

  - title: Free-space trend
    panels:
      - type: timeseries
        title: Free space by mount
        description: Free bytes per volume over the planning window. The slope is what the days-to-full fit extrapolates.
        unit: bytes
        min: 0
        legend: table
        targets:
          - expr: node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
            legend: "{{instance}} {{mountpoint}}"
      - type: timeseries
        title: Used % by mount
        description: Used percentage per volume — the planning view of how full each mount is trending.
        unit: percent
        min: 0
        max: 100
        legend: table
        targets:
          - expr: >-
              100 * (1 - node_filesystem_avail_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
              / node_filesystem_size_bytes{job="$job", instance=~"$instance", fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"})
            legend: "{{instance}} {{mountpoint}}"

alerts:
  - name: VolumePredictedFullThisWeek
    severity: warning
    expr: >-
      predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}[7d], 7 * 86400) < 0
      and node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"} > 0
    for: 1h
    summary: "Volume {{ $labels.mountpoint }} on {{ $labels.instance }} predicted full within 7 days"
    why: A 7-day projection crossing zero gives enough lead time to approve and execute a volume expansion before it becomes an incident.
    investigate: "Open Linux / Volume Capacity, find the mount in the days-to-full table, and confirm the growth-rate bar to rule out a one-off spike."
    runbook: "Plan an expansion or data-retention change now; for cloud volumes, schedule the resize; for logs/artifacts, tighten retention."
    recovery: Clears once the projection no longer reaches zero within 7 days.
    false_positives: Cyclic mounts that fill then get cleaned (CI caches) can trip the fit — exclude them or lengthen the window.
  - name: VolumeLowFreeSpace
    severity: warning
    expr: >-
      node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"}
      / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs|nsfs|fuse.*"} < 0.10
    for: 30m
    summary: "Volume {{ $labels.mountpoint }} on {{ $labels.instance }} below 10% free"
    why: Under 10% free a volume has little planning runway left; without action it becomes an operational disk-full page soon.
    investigate: "Check the growth-rate bar for the mount; a fast slope means the days-to-full clock is short."
    runbook: "Expand the volume or reclaim space; coordinate with the team that owns the data on that mount."
    recovery: Clears when free space rises above 10% for 5m.
    false_positives: Volumes intentionally run near full (immutable archives) — exclude those mounts.

troubleshooting:
  - symptom: Days-to-full table is empty
    cause: No mount has a negative free-space slope over the 7-day window.
    action: Expected when storage is stable; check the free-space trend panel for slow growth.
  - symptom: Growth rate looks wrong right after provisioning a volume
    cause: The 7-day fit includes the step change when the volume was created or resized.
    action: Wait for the fit window to clear the step, or shorten the window temporarily.
  - symptom: Container overlay mounts dominate the list
    cause: Ephemeral filesystems are being included.
    action: They are excluded by the `fstype!~` filter; extend the regex for your runtime.

performance: >-
  This dashboard runs on a 7-day window with `deriv(...[7d])` and `predict_linear(...[7d])`,
  which scan a week of samples per mount — keep the variable scope tight and avoid pointing
  it at per-container filesystem cardinality. A 1m refresh is plenty for capacity planning;
  there is no need to query this as often as an operational dashboard.

customization: >-
  Match the `fstype!~` regex to the volumes you provision. Tune the 10%-free and 7-day
  prediction thresholds to your procurement/expansion lead time. Lengthen the fit window to
  14d or 30d for slowly-growing archival volumes to suppress short-term noise.
