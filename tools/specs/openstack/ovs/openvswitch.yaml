title: OpenStack / Open vSwitch — Dataplane
description: >-
  Open vSwitch dataplane health on OpenStack network and compute nodes: interface
  packet drops and errors, datapath flow count, and megaflow cache efficiency. Leads
  with drop/error rate and flow count so packet loss on the virtual switch surfaces
  before it shows up as tenant application latency.
datasource: prometheus
tags: [openstack, openvswitch, ovs, dataplane, networking]
seo_phrase: Open vSwitch Grafana dashboard

refresh: 30s
time_from: now-6h

questions:
  - "Are OVS interfaces dropping or erroring packets right now?"
  - "How many datapath flows are installed — is the kernel flow table bloating?"
  - "Which interfaces are dropping the most packets?"
  - "Is the megaflow cache efficient, or are masks exploding (cache thrash)?"
  - "Are rx or tx drops dominating — receive pressure vs send pressure?"

production_lessons: >-
  When tenants complain that "the network is slow" but every link is up and every
  agent is alive, the culprit is usually the virtual switch silently dropping
  packets. OVS drops don't trigger an interface-down event — they accumulate in
  per-interface counters that nobody watches, so this dashboard leads with the
  aggregate **drop and error rate** and then ranks the worst interfaces. The second,
  subtler failure mode is **megaflow cache thrash**: when traffic is too diverse for
  the kernel datapath cache, the number of masks climbs and every packet pays for
  more subtable lookups, burning CPU on the network node. Watching mask count
  alongside flow count catches that before it turns into datapath CPU saturation.
  If your exporter uses different metric names, the dataplane counters below come
  from the ovs-exporter / openvswitch-exporter — adjust the names to match.

data_sources:
  - "`ovs-exporter` (a.k.a. `openvswitch-exporter`) on each OVS host — exposes
    `ovs_dp_flows_total`, `ovs_dp_if_total`, `ovs_interface_rx_dropped`,
    `ovs_interface_tx_dropped`, `ovs_interface_rx_errors`,
    `ovs_interface_collisions`, `ovs_dp_masks_hit` and `ovs_dp_masks_total`
    (counters; rated over 5m)."

templating:
  - name: job
    label: Job
    query: label_values(ovs_dp_flows_total, job)
    description: Prometheus scrape job for your ovs-exporter targets.
    multi: false
    includeAll: false
  - name: instance
    label: Host
    query: label_values(ovs_dp_flows_total{job="$job"}, instance)
    description: OVS host(s) to display; supports multi-select.
    multi: true
    includeAll: true

rows:
  - title: Dataplane health — read these first
    panels:
      - type: stat
        title: Drop rate
        description: Combined rx+tx packet drops per second across selected hosts.
        unit: pps
        decimals: 1
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 1}
          - {color: red, value: 50}
        targets:
          - expr: >-
              sum(rate(ovs_interface_rx_dropped{job="$job", instance=~"$instance"}[5m]))
              + sum(rate(ovs_interface_tx_dropped{job="$job", instance=~"$instance"}[5m])) or vector(0)
            instant: true
            legend: drops
      - type: stat
        title: Error rate
        description: Receive errors per second — CRC/frame errors point at NIC or cabling, not just congestion.
        unit: pps
        decimals: 1
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 0.5}
          - {color: red, value: 10}
        targets:
          - expr: sum(rate(ovs_interface_rx_errors{job="$job", instance=~"$instance"}[5m])) or vector(0)
            instant: true
            legend: errors
      - type: stat
        title: Datapath flows
        description: Total flows installed in the kernel datapath across selected hosts.
        unit: short
        decimals: 0
        colorMode: value
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 100000}
          - {color: red, value: 200000}
        targets:
          - expr: sum(ovs_dp_flows_total{job="$job", instance=~"$instance"}) or vector(0)
            instant: true
            legend: flows
      - type: stat
        title: Interfaces dropping
        description: Count of interfaces currently dropping packets — the breadth of the problem.
        unit: short
        decimals: 0
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 1}
          - {color: red, value: 10}
        targets:
          - expr: >-
              count(
                rate(ovs_interface_rx_dropped{job="$job", instance=~"$instance"}[5m])
                + rate(ovs_interface_tx_dropped{job="$job", instance=~"$instance"}[5m]) > 0
              ) or vector(0)
            instant: true
            legend: dropping

  - title: Drops & errors
    panels:
      - type: timeseries
        title: Drop & error rate over time
        description: rx/tx drops and rx errors as rates — separates receive pressure from send pressure from hardware faults.
        unit: pps
        min: 0
        legend: table
        targets:
          - expr: sum(rate(ovs_interface_rx_dropped{job="$job", instance=~"$instance"}[5m]))
            legend: rx drops
          - expr: sum(rate(ovs_interface_tx_dropped{job="$job", instance=~"$instance"}[5m]))
            legend: tx drops
          - expr: sum(rate(ovs_interface_rx_errors{job="$job", instance=~"$instance"}[5m]))
            legend: rx errors
          - expr: sum(rate(ovs_interface_collisions{job="$job", instance=~"$instance"}[5m]))
            legend: collisions
      - type: bargauge
        title: Top interfaces by drop rate
        description: The worst-dropping interfaces, ranked — where to focus the investigation.
        unit: pps
        decimals: 2
        orientation: horizontal
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 1}
          - {color: red, value: 10}
        targets:
          - expr: >-
              topk(10,
                rate(ovs_interface_rx_dropped{job="$job", instance=~"$instance"}[5m])
                + rate(ovs_interface_tx_dropped{job="$job", instance=~"$instance"}[5m])
              )
            instant: true
            legend: "{{interface}} @ {{instance}}"

  - title: Datapath & megaflow cache
    panels:
      - type: timeseries
        title: Datapath flows per host
        description: Kernel flow-table size per host — a steady climb means flow-table bloat and rising lookup cost.
        unit: short
        min: 0
        legend: table
        thresholdsStyle: dashed
        thresholds:
          - {color: green, value: null}
          - {color: red, value: 200000}
        targets:
          - expr: sum by (instance) (ovs_dp_flows_total{job="$job", instance=~"$instance"})
            legend: "{{instance}}"
      - type: timeseries
        title: Megaflow masks per host
        description: Datapath mask count per host — climbing masks mean cache fragmentation and more subtable lookups per packet.
        unit: short
        min: 0
        legend: table
        thresholdsStyle: dashed
        thresholds:
          - {color: green, value: null}
          - {color: red, value: 100}
        targets:
          - expr: sum by (instance) (ovs_dp_masks_total{job="$job", instance=~"$instance"})
            legend: "{{instance}}"
      - type: stat
        title: Datapath interfaces
        description: Interfaces attached to the OVS datapaths across selected hosts.
        unit: short
        decimals: 0
        colorMode: value
        thresholds:
          - {color: blue, value: null}
        targets:
          - expr: sum(ovs_dp_if_total{job="$job", instance=~"$instance"}) or vector(0)
            instant: true
            legend: interfaces

alerts:
  - name: OVSInterfaceDrops
    severity: warning
    expr: >-
      rate(ovs_interface_rx_dropped[5m]) + rate(ovs_interface_tx_dropped[5m]) > 10
    for: 10m
    summary: "OVS interface {{ $labels.interface }} on {{ $labels.instance }} dropping >10 pps"
    why: Sustained drops on the virtual switch cause retransmits and tail latency that look like application problems, with every link reporting up.
    investigate: "Open OpenStack / Open vSwitch — Dataplane; check whether rx or tx dominates and whether one host or many are affected."
    runbook: "rx drops point at receive overload (raise rx ring buffers / enable RPS, check for a traffic storm); tx drops point at egress congestion or a saturated uplink."
    recovery: Clears when the drop rate falls below 10 pps for 5m.
    false_positives: A brief traffic burst can spike drops momentarily — the 10m `for` filters transients.
  - name: OVSInterfaceErrors
    severity: warning
    expr: rate(ovs_interface_rx_errors[5m]) > 1
    for: 10m
    summary: "OVS interface {{ $labels.interface }} on {{ $labels.instance }} erroring"
    why: rx errors (CRC/frame) usually mean a hardware or cabling fault on the physical NIC behind the bridge, not just congestion — a different responder.
    investigate: "Check the underlying physical NIC counters and switch port; correlate with collisions on the same interface."
    runbook: "Inspect cabling/transceiver, move the uplink to a known-good port, or replace the NIC; check for a duplex mismatch."
    recovery: Clears when the error rate returns to zero for 5m.
    false_positives: A single transient error during a link renegotiation is benign — the threshold and `for` ignore those.
  - name: OVSDatapathFlowExplosion
    severity: warning
    expr: ovs_dp_flows_total > 200000
    for: 15m
    summary: "OVS datapath on {{ $labels.instance }} holds >200k flows"
    why: A bloated kernel flow table and exploding megaflow masks drive up per-packet lookup cost and can saturate the network node's CPU (ovs-vswitchd).
    investigate: "Compare flow and mask counts on the megaflow panel; look for a noisy tenant generating highly diverse traffic (e.g. a scan)."
    runbook: "Identify and rate-limit the traffic source; tune `ovs-vsctl` datapath flow limits / revalidator threads; consider flow eviction tuning."
    recovery: Clears when the datapath flow count falls below 200k.
    false_positives: Legitimately large hosts run high flow counts — raise the threshold to match your datapath sizing.

troubleshooting:
  - symptom: All panels show "No data"
    cause: ovs-exporter not running, or the metric names differ from this exporter build.
    action: "Confirm `up{job=\"$job\"}` and check the exporter's `/metrics` for the actual `ovs_*` names; adjust the spec if they differ."
  - symptom: Drop rate is high but errors are zero
    cause: Congestion/overload rather than a hardware fault.
    action: Look at rx vs tx split and ring-buffer sizing; this is a capacity problem, not a cabling one.
  - symptom: Mask count climbs with flow count
    cause: Highly diverse traffic is fragmenting the megaflow cache.
    action: Find the traffic source; expect elevated ovs-vswitchd CPU until it is contained.

performance: >-
  Rates use a 5m window (≥4× a typical 15-30s scrape) so counters survive resets.
  Aggregate panels collapse with `sum`/`sum by (instance)`; per-interface panels are
  bounded with `topk(10)`. On hosts with thousands of interfaces, scope `$instance`
  and prefer a recording rule for the combined drop-rate expression.

customization: >-
  Tune the drop/error/flow thresholds to your dataplane sizing — busy DPDK or
  high-throughput nodes run higher baselines. If your exporter names interface
  counters differently (e.g. `ovs_interface_statistics_*`), update the metric names
  and the `{{interface}}` legend label to match.
