title: OpenStack / Glance — Image Service
description: >-
  Image-service inventory and storage for an OpenStack deployment: how many images
  exist, how much store space they consume, which images are largest, and how fast
  the store is growing toward its capacity. Leads with image count, total storage and
  growth so you see store pressure before an upload starts failing.
datasource: prometheus
tags: [openstack, glance, images, storage, openstack-exporter]
seo_phrase: OpenStack Glance Grafana dashboard

refresh: 1m
time_from: now-7d

questions:
  - "How many images does the deployment hold?"
  - "How much total store capacity are images consuming?"
  - "How fast is image storage growing (last 24h)?"
  - "Which images are the largest consumers of the store?"
  - "Given the trend, when will the image store fill up?"

production_lessons: >-
  Glance is the OpenStack service operators forget about until an upload fails — the
  store fills quietly because images are large, long-lived and rarely pruned. A
  handful of forgotten snapshots-turned-images or a CI pipeline that registers a new
  image on every build can consume terabytes that nobody is watching. This dashboard
  leads with total storage and 24h growth so a runaway producer is obvious, and it
  ranks the largest images because reclaiming space is almost always a matter of
  deleting the top few rather than chasing thousands of small ones. The exporter
  reports per-image bytes but not the store's total size, so the store ceiling is a
  template variable used to compute used-% and a projected fill date.

data_sources:
  - "`openstack-exporter` with Glance enabled — exposes `openstack_glance_images`
    (image count) and `openstack_glance_image_bytes` (per-image size, labels `name`
    and `id`). Set `$store_capacity_gb` to your image store's usable size."

templating:
  - name: job
    label: Job
    query: label_values(openstack_glance_images, job)
    description: Prometheus scrape job for your openstack-exporter target(s).
    multi: false
    includeAll: false
  - name: store_capacity_gb
    label: Store capacity (GB)
    type: textbox
    default: "2048"
    description: Usable size of the Glance image store in GB, used for used-% and the fill projection.

rows:
  - title: Store pressure — read these first
    panels:
      - type: stat
        title: Images
        description: Total images registered in Glance.
        unit: short
        decimals: 0
        colorMode: value
        thresholds:
          - {color: blue, value: null}
        targets:
          - expr: sum(openstack_glance_images{job="$job"}) or vector(0)
            instant: true
            legend: images
      - type: stat
        title: Total image storage
        description: Sum of all image sizes — what the store is actually holding.
        unit: bytes
        decimals: 1
        colorMode: value
        thresholds:
          - {color: blue, value: null}
        targets:
          - expr: sum(openstack_glance_image_bytes{job="$job"}) or vector(0)
            instant: true
            legend: stored
      - type: stat
        title: Growth (24h)
        description: Change in total image storage over the last day — a large positive jump flags a runaway producer.
        unit: bytes
        decimals: 1
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 53687091200}
          - {color: red, value: 214748364800}
        targets:
          - expr: >-
              sum(openstack_glance_image_bytes{job="$job"})
              - sum(openstack_glance_image_bytes{job="$job"} offset 24h) or vector(0)
            instant: true
            legend: growth24h
      - type: gauge
        title: Store used
        description: Image storage as a share of the configured store capacity.
        unit: percent
        min: 0
        max: 100
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 75}
          - {color: red, value: 90}
        targets:
          - expr: >-
              100 * sum(openstack_glance_image_bytes{job="$job"})
              / ($store_capacity_gb * 1073741824)
            instant: true
            legend: used

  - title: Largest images
    panels:
      - type: bargauge
        title: Top 10 images by size
        description: The biggest store consumers — reclaiming space usually starts here.
        unit: bytes
        decimals: 1
        orientation: horizontal
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 21474836480}
          - {color: red, value: 107374182400}
        targets:
          - expr: topk(10, openstack_glance_image_bytes{job="$job"})
            instant: true
            legend: "{{name}}"
      - type: table
        title: Image detail
        description: Per-image size with name and id — sort to find candidates for deletion.
        unit: bytes
        targets:
          - expr: topk(20, openstack_glance_image_bytes{job="$job"})
            instant: true
            legend: "{{name}}"

  - title: Growth & projection
    panels:
      - type: timeseries
        title: Total storage vs capacity
        description: Image storage against the store ceiling — the gap is your remaining headroom.
        unit: bytes
        min: 0
        fillOpacity: 20
        legend: table
        thresholdsStyle: dashed
        thresholds:
          - {color: green, value: null}
          - {color: red, value: 0}
        targets:
          - expr: sum(openstack_glance_image_bytes{job="$job"})
            legend: stored
          - expr: $store_capacity_gb * 1073741824
            legend: capacity
      - type: timeseries
        title: Image count over time
        description: Registered image count — a steady climb with no pruning is the slow road to a full store.
        unit: short
        min: 0
        legend: table
        targets:
          - expr: sum(openstack_glance_images{job="$job"})
            legend: images
      - type: stat
        title: Projected days to full
        description: Days until the store fills, from the last 24h growth rate.
        unit: dtdurations
        decimals: 1
        colorMode: background
        thresholds:
          - {color: red, value: null}
          - {color: yellow, value: 1209600}
          - {color: green, value: 5184000}
        targets:
          - expr: >-
              ($store_capacity_gb * 1073741824 - sum(openstack_glance_image_bytes{job="$job"}))
              / clamp_min(deriv(sum(openstack_glance_image_bytes{job="$job"})[24h:]), 0.0000001)
            instant: true
            legend: daysToFull

alerts:
  - name: GlanceStoreNearFull
    severity: warning
    expr: >-
      100 * sum(openstack_glance_image_bytes) / (2048 * 1073741824) > 85
    for: 30m
    summary: "Glance image store over 85% full"
    why: When the image store fills, new image uploads and instance snapshots fail, blocking deploys and backups.
    investigate: "Open OpenStack / Glance — Image Service; check the largest-images panel for reclaim candidates."
    runbook: "Delete obsolete images/snapshots, deduplicate base images, or expand the image store backend."
    recovery: Clears when store usage drops below 85%.
    false_positives: The hardcoded 2048 GB must match your real store size — update it (and the `$store_capacity_gb` variable) to your deployment.
  - name: GlanceStoragePredictedExhaustion
    severity: critical
    expr: >-
      predict_linear(sum(openstack_glance_image_bytes)[24h:], 7 * 86400) > 2048 * 1073741824
    for: 1h
    summary: "Glance image store projected to fill within 7 days"
    why: A dated deadline lets you prune or expand on schedule rather than during a failed deploy.
    investigate: "Confirm whether a CI pipeline or snapshot job is registering images faster than they are pruned."
    runbook: "Add a retention policy that prunes old images/snapshots, or expand the store; throttle the producer to buy time."
    recovery: Clears when the projection no longer crosses capacity.
    false_positives: A one-off bulk image import skews the linear fit — the 24h window and 1h `for` damp transient slopes.
  - name: GlanceImageCountDrop
    severity: warning
    expr: sum(openstack_glance_images) < sum(openstack_glance_images offset 1h) * 0.8
    for: 10m
    summary: "Glance image count dropped more than 20% in an hour"
    why: A sudden drop usually means a bulk deletion — accidental, malicious, or a misfired cleanup job that removed images still in use.
    investigate: "Check audit logs for who/what deleted images; confirm no in-use base image was removed."
    runbook: "If the deletion was unintended, restore images from backup and revoke the offending credential or fix the cleanup job."
    recovery: Clears when the count stabilises above the threshold.
    false_positives: A planned image-retention sweep legitimately removes many images — silence during scheduled cleanups.

troubleshooting:
  - symptom: Used % stuck at zero or wrong
    cause: "`$store_capacity_gb` not set to the real store size."
    action: Set the Store capacity variable (and the alert constants) to your image store's usable GB.
  - symptom: Largest-images panel shows duplicate names
    cause: Multiple image versions share a name; the `id` label disambiguates them.
    action: Use the Image detail table and sort by id to find the exact image to delete.
  - symptom: Days-to-full shows a huge value
    cause: Storage is flat, so the growth rate is near zero — this is healthy.
    action: Ignore very large projections; the `clamp_min` guard keeps the division defined.

performance: >-
  Aggregate panels use a single `sum`; the per-image bargauge and table are bounded
  with `topk(10)`/`topk(20)` so they never render more than a handful of series even
  with thousands of images. The 24h `offset`/`deriv` math is evaluated once per
  refresh.

customization: >-
  The key knob is `$store_capacity_gb` — set it to your image store's usable size and
  mirror it in the alert constants (alerts can't read dashboard variables). Tune the
  growth and largest-image byte thresholds to your image sizes; raise `topk` if you
  routinely audit more than the top 20.
