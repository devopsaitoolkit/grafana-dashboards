# MySQL / MariaDB fleet health overview. Leads with liveness, connection saturation
# against max_connections, and the slow-query rate — the first three things an on-call
# DBA checks.
uid: mysql-overview
title: MySQL / Overview
description: >-
  Top-level health for MySQL and MariaDB servers scraped by mysqld_exporter:
  liveness, thread/connection saturation against max_connections, query and slow-query
  rates, the command mix, InnoDB buffer-pool hit ratio and uptime. Answers "is this
  server healthy and does it have connection and cache headroom?".
datasource: prometheus
tags: [mysql, mariadb, database, mysqld-exporter, overview]
seo_phrase: MySQL Grafana dashboard
refresh: 30s
time_from: now-6h

questions:
  - "Is MySQL up and serving queries right now?"
  - "How close are we to max_connections (thread saturation)?"
  - "Is the slow-query rate climbing?"
  - "What is the read/write command mix?"
  - "Is the InnoDB buffer pool still absorbing reads?"

production_lessons: >-
  MySQL outages cluster around two numbers: threads_connected hitting max_connections
  (after which the server returns "Too many connections" and the app falls over) and a
  slow-query rate that quietly multiplies until threads pile up. This dashboard leads
  with both, plus the buffer-pool hit ratio, because a buffer pool that stops absorbing
  reads turns every query into disk I/O and is usually the root cause behind the slow
  queries. Threads_running matters more than threads_connected during an incident: a
  thousand connected but five running is idle pooling; fifty running is real concurrency
  the server is struggling to clear.

data_sources:
  - "`mysqld_exporter` pointed at each server (the `mysql_up`,
    `mysql_global_status_threads_*`, `mysql_global_variables_max_connections`,
    `mysql_global_status_queries`, `mysql_global_status_slow_queries` and
    `mysql_global_status_innodb_buffer_pool_*` series)."

templating:
  - name: instance
    label: Instance
    query: label_values(mysql_up, instance)
    description: MySQL/MariaDB server(s) to display; supports multi-select.
    multi: true
    includeAll: true

rows:
  - title: Health — read these first
    panels:
      - type: stat
        title: MySQL up
        description: Liveness from mysqld_exporter. 1 = the exporter reached the server.
        unit: short
        decimals: 0
        colorMode: background
        mappings:
          - type: value
            options:
              "0": {text: DOWN, color: red, index: 0}
              "1": {text: UP, color: green, index: 1}
        thresholds:
          - {color: red, value: null}
          - {color: green, value: 1}
        targets:
          - expr: min(mysql_up{instance=~"$instance"}) or vector(0)
            instant: true
            legend: up
      - type: gauge
        title: Connection saturation
        description: Worst instance's threads_connected as a percentage of max_connections.
        unit: percent
        min: 0
        max: 100
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 75}
          - {color: red, value: 90}
        targets:
          - expr: >-
              max(
                100 * mysql_global_status_threads_connected{instance=~"$instance"}
                / on (instance) mysql_global_variables_max_connections{instance=~"$instance"}
              ) or vector(0)
            instant: true
            legend: saturation
      - type: stat
        title: Slow queries
        description: Slow queries per second across selected servers — queries exceeding long_query_time.
        unit: ops
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 0.1}
          - {color: red, value: 1}
        targets:
          - expr: sum(rate(mysql_global_status_slow_queries{instance=~"$instance"}[5m])) or vector(0)
            instant: true
            legend: slow/s
      - type: gauge
        title: InnoDB buffer pool hit ratio
        description: Share of InnoDB reads served from the buffer pool over 5m. Below ~99% means disk reads.
        unit: percent
        min: 0
        max: 100
        thresholds:
          - {color: red, value: null}
          - {color: yellow, value: 95}
          - {color: green, value: 99}
        targets:
          - expr: >-
              100 * (1 - sum(rate(mysql_global_status_innodb_buffer_pool_reads{instance=~"$instance"}[5m]))
              / clamp_min(sum(rate(mysql_global_status_innodb_buffer_pool_read_requests{instance=~"$instance"}[5m])), 1))
            instant: true
            legend: hit ratio

  - title: Throughput
    panels:
      - type: timeseries
        title: Queries per second
        description: Total query throughput. The baseline for everything else on this dashboard.
        unit: ops
        min: 0
        targets:
          - expr: sum(rate(mysql_global_status_queries{instance=~"$instance"}[5m]))
            legend: queries/s
      - type: timeseries
        title: Command mix
        description: Read vs write balance from the SELECT/INSERT/UPDATE/DELETE counters.
        unit: ops
        min: 0
        stacking: normal
        fillOpacity: 30
        legend: table
        targets:
          - expr: sum(rate(mysql_global_status_commands_total{instance=~"$instance", command="select"}[5m]))
            legend: select/s
          - expr: sum(rate(mysql_global_status_commands_total{instance=~"$instance", command="insert"}[5m]))
            legend: insert/s
          - expr: sum(rate(mysql_global_status_commands_total{instance=~"$instance", command="update"}[5m]))
            legend: update/s
          - expr: sum(rate(mysql_global_status_commands_total{instance=~"$instance", command="delete"}[5m]))
            legend: delete/s
      - type: timeseries
        title: Slow query rate
        description: Slow queries per second over time. A rising line precedes thread pile-ups.
        unit: ops
        min: 0
        drawStyle: bars
        fillOpacity: 50
        targets:
          - expr: sum(rate(mysql_global_status_slow_queries{instance=~"$instance"}[5m]))
            legend: slow/s

  - title: Connections
    panels:
      - type: timeseries
        title: Threads connected vs running
        description: Connected threads are the pool; running threads are the real concurrency the server must clear.
        unit: short
        min: 0
        legend: table
        targets:
          - expr: mysql_global_status_threads_connected{instance=~"$instance"}
            legend: "{{instance}} connected"
          - expr: mysql_global_status_threads_running{instance=~"$instance"}
            legend: "{{instance}} running"
      - type: timeseries
        title: Connected vs max, with peak
        description: Threads connected against max_connections and the high-water mark since startup.
        unit: short
        min: 0
        legend: table
        targets:
          - expr: mysql_global_status_threads_connected{instance=~"$instance"}
            legend: "{{instance}} connected"
          - expr: mysql_global_status_max_used_connections{instance=~"$instance"}
            legend: "{{instance}} peak"
          - expr: mysql_global_variables_max_connections{instance=~"$instance"}
            legend: "{{instance}} max"
      - type: timeseries
        title: Aborted connects
        description: Failed connection attempts per second — auth failures, bad handshakes or a saturated server.
        unit: ops
        min: 0
        targets:
          - expr: sum(rate(mysql_global_status_aborted_connects{instance=~"$instance"}[5m]))
            legend: aborted/s

  - title: Engine
    panels:
      - type: gauge
        title: Buffer pool hit ratio over time window
        description: Same hit ratio as the headline gauge, as a second confirmation read.
        unit: percent
        min: 0
        max: 100
        thresholds:
          - {color: red, value: null}
          - {color: yellow, value: 95}
          - {color: green, value: 99}
        targets:
          - expr: >-
              100 * (1 - sum(rate(mysql_global_status_innodb_buffer_pool_reads{instance=~"$instance"}[5m]))
              / clamp_min(sum(rate(mysql_global_status_innodb_buffer_pool_read_requests{instance=~"$instance"}[5m])), 1))
            instant: true
            legend: hit ratio
      - type: stat
        title: Uptime
        description: Time since the MySQL server last started. A reset to near-zero means an unexpected restart.
        unit: s
        colorMode: value
        thresholds:
          - {color: red, value: null}
          - {color: yellow, value: 600}
          - {color: green, value: 3600}
        targets:
          - expr: min(mysql_global_status_uptime{instance=~"$instance"}) or vector(0)
            instant: true
            legend: uptime

alerts:
  - name: MySQLInstanceDown
    severity: critical
    expr: mysql_up == 0
    for: 1m
    summary: "MySQL {{ $labels.instance }} is down"
    why: The exporter cannot reach the server — application queries are likely failing too.
    investigate: "Check the mysqld service and host; confirm the exporter credentials and that the server accepts connections."
    runbook: "Restart mysqld if crashed; on a host failure, promote a replica and repoint the application."
    recovery: Clears once mysql_up reports 1 again.
    false_positives: Exporter restart or credential rotation can briefly trip this — keep `for` at 1m.
  - name: MySQLConnectionSaturationHigh
    severity: warning
    expr: >-
      100 * mysql_global_status_threads_connected
      / on (instance) mysql_global_variables_max_connections > 85
    for: 10m
    summary: "MySQL {{ $labels.instance }} using >85% of max_connections"
    why: At 100% the server returns "Too many connections" and the whole application fails, even with spare CPU.
    investigate: "Open MySQL / Overview; check threads_running, aborted_connects and whether a pooler is missing."
    runbook: "Add ProxySQL or a connection pool, cut per-app pool sizes, and kill stuck sleeping threads."
    recovery: Clears when saturation drops below 85% for 5m.
    false_positives: Short spikes during deploys or pool warm-up; raise `for` if your pooler recycles connections.
  - name: MySQLSlowQueryRateHigh
    severity: warning
    expr: sum by (instance) (rate(mysql_global_status_slow_queries[5m])) > 1
    for: 10m
    summary: "MySQL {{ $labels.instance }} slow-query rate above 1/s"
    why: A rising slow-query rate ties up threads and is the usual precursor to connection exhaustion.
    investigate: "Enable the slow query log; check the buffer-pool hit ratio and look for a missing index or a full scan."
    runbook: "Add the missing index, rewrite the offending query, or raise the buffer pool if reads are hitting disk."
    recovery: Clears when the slow-query rate drops below 1/s for 5m.
    false_positives: A low long_query_time or a heavy nightly report can inflate the rate; tune the threshold per workload.

troubleshooting:
  - symptom: All panels show "No data"
    cause: mysqld_exporter not scraped or wrong `$instance`.
    action: "Check `mysql_up` in Explore and confirm the instance label matches your scrape config."
  - symptom: Command-mix panel is empty
    cause: This build of the exporter uses per-command counters under a different name.
    action: Confirm `mysql_global_status_commands_total` exists; some versions expose `mysql_global_status_com_select` etc. instead.
  - symptom: Buffer pool hit ratio reads 100% with no traffic
    cause: read_requests rate is ~0, so the clamp dominates.
    action: Read it alongside the queries-per-second panel; it is only meaningful under load.

performance: >-
  Rates use a 5m window (≥4× a typical 15–30s scrape) so a restart does not spike them.
  The buffer-pool ratio clamps its denominator with `clamp_min(...,1)` to stay defined
  at zero traffic. Saturation joins on `instance` to keep one series per server.

customization: >-
  Tune the 85% saturation and 99% buffer-pool thresholds to your SLOs. If your exporter
  exposes per-command `mysql_global_status_com_*` gauges instead of
  `mysql_global_status_commands_total`, swap the command-mix targets accordingly.
