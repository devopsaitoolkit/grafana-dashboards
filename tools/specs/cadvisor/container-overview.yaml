title: cAdvisor / Container Overview
description: >-
  Top-down view of every container on a Docker host scraped by cAdvisor: the biggest
  CPU and memory consumers, how many containers are running, how many are being CPU
  throttled, and total network throughput. The first stop when a host is busy but you
  do not yet know which container is to blame.
datasource: prometheus
tags: [cadvisor, containers, docker, overview, saturation]
seo_phrase: cAdvisor container overview Grafana dashboard
refresh: 30s
time_from: now-3h

questions:
  - "Which containers are burning the most CPU and memory right now?"
  - "How many containers are running on this host?"
  - "Are any containers being CPU throttled (capped below what they want)?"
  - "What is the total container network throughput?"

production_lessons: >-
  On a busy Docker host the host-level CPU graph tells you *that* you have a problem,
  not *which container* caused it — so this board leads with ranked top-N consumers,
  not aggregate lines. The metric most teams forget to watch is **CPU throttling**: a
  container pinned at its CFS quota looks "only 100% of its limit" while actually
  queueing every request, so we surface the throttled-container count next to the
  consumers. Always filter `name!=""` — cAdvisor emits machine and cgroup-root series
  with empty names that otherwise double-count everything.

data_sources:
  - "`cAdvisor` on the Docker host (the `container_cpu_usage_seconds_total`,
    `container_memory_working_set_bytes`, `container_cpu_cfs_throttled_periods_total`,
    `container_network_*` and `container_last_seen` series). The `name` label carries
    the Docker container name; empty-name cgroup series are excluded."
  - "`machine_cpu_cores` (also from cAdvisor) is used to express CPU as a share of host cores."

templating:
  - name: instance
    label: Host
    query: label_values(machine_cpu_cores, instance)
    description: cAdvisor instance (the Docker host) to inspect.
    multi: false
    includeAll: false

rows:
  - title: Headline — biggest consumers & throttling
    panels:
      - type: bargauge
        title: Top CPU consumers (cores)
        description: Containers ranked by CPU cores used over the last 5 minutes.
        unit: short
        decimals: 2
        min: 0
        orientation: horizontal
        targets:
          - expr: >-
              topk(10, sum by (name) (rate(container_cpu_usage_seconds_total{instance="$instance", name!=""}[5m])))
            instant: true
            legend: "{{name}}"
      - type: bargauge
        title: Top memory consumers
        description: Containers ranked by working-set memory (the RSS the kernel cannot reclaim).
        unit: bytes
        min: 0
        orientation: horizontal
        targets:
          - expr: >-
              topk(10, sum by (name) (container_memory_working_set_bytes{instance="$instance", name!=""}))
            instant: true
            legend: "{{name}}"
      - type: stat
        title: Running containers
        description: Containers seen by cAdvisor in the last scrape.
        unit: short
        decimals: 0
        colorMode: value
        thresholds:
          - {color: green, value: null}
        targets:
          - expr: count(count by (name) (container_last_seen{instance="$instance", name!=""})) or vector(0)
            instant: true
            legend: containers
      - type: stat
        title: Throttled containers
        description: Containers whose CFS quota is actively capping them right now.
        unit: short
        decimals: 0
        colorMode: background
        thresholds:
          - {color: green, value: null}
          - {color: yellow, value: 1}
          - {color: red, value: 5}
        targets:
          - expr: >-
              count(sum by (name) (rate(container_cpu_cfs_throttled_periods_total{instance="$instance", name!=""}[5m])) > 0) or vector(0)
            instant: true
            legend: throttled

  - title: CPU & memory detail
    panels:
      - type: timeseries
        title: CPU usage by container
        description: Per-container CPU cores over time. Spot the noisy neighbour.
        unit: short
        min: 0
        legend: table
        targets:
          - expr: >-
              topk(10, sum by (name) (rate(container_cpu_usage_seconds_total{instance="$instance", name!=""}[5m])))
            legend: "{{name}}"
      - type: timeseries
        title: Memory working set by container
        description: Per-container working-set memory trend — a steady climb is a leak.
        unit: bytes
        min: 0
        legend: table
        targets:
          - expr: >-
              topk(10, sum by (name) (container_memory_working_set_bytes{instance="$instance", name!=""}))
            legend: "{{name}}"
      - type: timeseries
        title: CPU throttling ratio by container
        description: Fraction of CFS periods that were throttled — anything sustained above 25% hurts latency.
        unit: percentunit
        min: 0
        max: 1
        legend: table
        thresholdsStyle: dashed
        thresholds:
          - {color: green, value: null}
          - {color: red, value: 0.25}
        targets:
          - expr: >-
              topk(10,
                sum by (name) (rate(container_cpu_cfs_throttled_periods_total{instance="$instance", name!=""}[5m]))
                / clamp_min(sum by (name) (rate(container_cpu_cfs_periods_total{instance="$instance", name!=""}[5m])), 1))
            legend: "{{name}}"

  - title: Network
    panels:
      - type: timeseries
        title: Receive throughput by container (top 10)
        description: Inbound bandwidth per container.
        unit: Bps
        min: 0
        legend: table
        targets:
          - expr: >-
              topk(10, sum by (name) (rate(container_network_receive_bytes_total{instance="$instance", name!=""}[5m])))
            legend: "{{name}}"
      - type: timeseries
        title: Transmit throughput by container (top 10)
        description: Outbound bandwidth per container.
        unit: Bps
        min: 0
        legend: table
        targets:
          - expr: >-
              topk(10, sum by (name) (rate(container_network_transmit_bytes_total{instance="$instance", name!=""}[5m])))
            legend: "{{name}}"

alerts:
  - name: ContainerCPUThrottlingHigh
    severity: warning
    expr: >-
      sum by (name, instance) (rate(container_cpu_cfs_throttled_periods_total{name!=""}[5m]))
      / clamp_min(sum by (name, instance) (rate(container_cpu_cfs_periods_total{name!=""}[5m])), 1) > 0.25
    for: 10m
    summary: "Container {{ $labels.name }} throttled {{ printf \"%.0f\" $value }}% of periods"
    why: A throttled container is capped below the CPU it is asking for, so requests queue and tail latency rises even though host CPU may look fine.
    investigate: "Open cAdvisor / Container Overview, scope to the host, and check the throttling-ratio panel for the container."
    runbook: "Raise the container's CPU limit/quota, or scale out so each replica needs less; if the limit is intentional, confirm the SLA still holds."
    recovery: Clears when the throttled fraction drops below 25% for 5m.
    false_positives: Short bursts during cold starts — the 10m window filters them.
  - name: ContainerMemoryNearLimit
    severity: warning
    expr: >-
      container_memory_working_set_bytes{name!=""}
      / (container_spec_memory_limit_bytes{name!=""} > 0) > 0.9
    for: 10m
    summary: "Container {{ $labels.name }} at {{ printf \"%.0f\" $value }}% of its memory limit"
    why: A container above 90% of its memory limit is one allocation away from an OOM kill, which restarts it and drops in-flight work.
    investigate: "Check the working-set trend for a leak versus legitimate growth."
    runbook: "Raise the memory limit, fix the leak, or reduce the workload's footprint."
    recovery: Clears when working set drops below 90% of the limit for 5m.
    false_positives: Containers with no limit set are excluded by the `> 0` guard, so every match is a real limit breach.
  - name: ContainerNetworkErrors
    severity: warning
    expr: sum by (name, instance) (rate(container_network_receive_errors_total{name!=""}[5m])) > 0
    for: 10m
    summary: "Container {{ $labels.name }} receiving network errors"
    why: Container NIC errors point at an overloaded bridge, a saturated host NIC, or a misbehaving overlay network — and cause retransmits the app sees as latency.
    investigate: "Correlate with host-level NIC errors and the container's network throughput."
    runbook: "Check the Docker bridge/overlay health and host NIC; restart the container's network namespace if it is wedged."
    recovery: Clears when the error rate returns to zero for 5m.
    false_positives: A transient burst during container restart or network reconfiguration.

troubleshooting:
  - symptom: Container counts are roughly double the real number
    cause: The `name!=""` filter is missing, so empty-name cgroup roots are counted.
    action: Every selector in this board includes `name!=""`; if you edited one, restore it.
  - symptom: CPU shows more cores than the host has
    cause: Summing per-cpu series without `by (name)` collapses across cores incorrectly.
    action: Keep the `sum by (name) (rate(...))` shape used here.
  - symptom: Memory consumers look low versus `docker stats`
    cause: Working set excludes reclaimable cache; `docker stats` shows RSS+cache.
    action: This is expected — working set is the number that triggers OOM, so it is the right one to rank by.

performance: >-
  Every panel uses `topk(10)` and `sum by (name)` to cap the series rendered no matter
  how many containers run. Rates use a 5m window (≥4× a 15s scrape). cAdvisor is a
  high-cardinality exporter; if scrapes slow down, drop per-cpu and per-interface
  series with metric_relabel_configs and scope `$instance` to one host.

customization: >-
  Change `topk(10)` to show more or fewer consumers. Adjust the 25% throttling and 90%
  memory thresholds to your tolerances. Add a `name` template variable to filter to a
  single container, or pivot the CPU panel to a share of `machine_cpu_cores` for a
  percent-of-host view.
