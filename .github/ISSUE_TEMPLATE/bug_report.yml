name: 🐛 Bug report
description: A dashboard panel shows wrong/empty data, a query is incorrect, or the build fails.
title: "[Bug] <dashboard or tool> — <summary>"
labels: ["bug"]
body:
  - type: input
    id: dashboard
    attributes:
      label: Dashboard / file
      placeholder: "dashboards/kubernetes/etcd.json or tools/dashgen/build.py"
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What's wrong
      description: Which panel/query, and what you expected vs. what you saw.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Grafana version, datasource (Prometheus/VictoriaMetrics/Mimir/Loki) and exporter versions.
      render: text
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Import dashboards/...
        2. Select datasource ...
        3. Panel "..." shows ...
