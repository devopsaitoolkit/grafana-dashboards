<rect x="1088" y="56" width="284" height="810" fill="#181b1f" stroke="#2c3235" rx="4"/>
<text x="1100" y="78" fill="#d8d9da" font-size="12" font-weight="700">What to look for</text>
<circle cx="1106" cy="94" r="4" fill="#3274d9"/>
<text x="1118" y="98" fill="#8e8e8e" font-size="10">Are all nodes in the Synced state</text>
<text x="1118" y="111" fill="#8e8e8e" font-size="10">(wsrep_local_state = 4)?</text>
<circle cx="1106" cy="128" r="4" fill="#3274d9"/>
<text x="1118" y="132" fill="#8e8e8e" font-size="10">Is the cluster the size I expect, or did</text>
<text x="1118" y="145" fill="#8e8e8e" font-size="10">a node drop out?</text>
<circle cx="1106" cy="162" r="4" fill="#3274d9"/>
<text x="1118" y="166" fill="#8e8e8e" font-size="10">Is flow control pausing writes (a slow</text>
<text x="1118" y="179" fill="#8e8e8e" font-size="10">node throttling the whole cluster)?</text>
<circle cx="1106" cy="196" r="4" fill="#3274d9"/>
<text x="1118" y="200" fill="#8e8e8e" font-size="10">Are the replication receive/send queues</text>
<text x="1118" y="213" fill="#8e8e8e" font-size="10">backing up on any node?</text>
<circle cx="1106" cy="230" r="4" fill="#73bf69"/>
<text x="1118" y="234" fill="#8e8e8e" font-size="10">Green: within expected range</text>
<circle cx="1106" cy="251" r="4" fill="#f2cc0c"/>
<text x="1118" y="255" fill="#8e8e8e" font-size="10">Yellow: investigate — approaching a</text>
<text x="1118" y="268" fill="#8e8e8e" font-size="10">limit</text>
<circle cx="1106" cy="285" r="4" fill="#e02f44"/>
<text x="1118" y="289" fill="#8e8e8e" font-size="10">Red: act now — threshold breached</text>
</svg>
