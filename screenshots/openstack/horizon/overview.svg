<circle cx="1106" cy="128" r="4" fill="#3274d9"/>
<text x="1118" y="132" fill="#8e8e8e" font-size="10">What HTTP status code is Horizon</text>
<text x="1118" y="145" fill="#8e8e8e" font-size="10">returning (200 vs 5xx/302-to-login)?</text>
<circle cx="1106" cy="162" r="4" fill="#3274d9"/>
<text x="1118" y="166" fill="#8e8e8e" font-size="10">How long is a page probe taking (is the</text>
<text x="1118" y="179" fill="#8e8e8e" font-size="10">UI slow)?</text>
<circle cx="1106" cy="196" r="4" fill="#3274d9"/>
<text x="1118" y="200" fill="#8e8e8e" font-size="10">How busy is the Apache/WSGI process</text>
<text x="1118" y="213" fill="#8e8e8e" font-size="10">behind Horizon (workers, request rate)?</text>
<circle cx="1106" cy="230" r="4" fill="#73bf69"/>
<text x="1118" y="234" fill="#8e8e8e" font-size="10">Green: within expected range</text>
<circle cx="1106" cy="251" r="4" fill="#f2cc0c"/>
<text x="1118" y="255" fill="#8e8e8e" font-size="10">Yellow: investigate — approaching a</text>
<text x="1118" y="268" fill="#8e8e8e" font-size="10">limit</text>
<circle cx="1106" cy="285" r="4" fill="#e02f44"/>
<text x="1118" y="289" fill="#8e8e8e" font-size="10">Red: act now — threshold breached</text>
