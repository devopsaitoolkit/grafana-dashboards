<text x="456" y="222" fill="#73bf69" font-size="20" font-weight="700" text-anchor="middle">●</text>
<rect x="546" y="88" width="172" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="546" y="88" width="172" height="3" fill="#3274d9" rx="2"/>
<text x="554" y="106" fill="#d8d9da" font-size="11" font-weight="500">Nodes up</text>
<text x="554" y="120" fill="#8e8e8e" font-size="9">stat · short</text>
<text x="632" y="222" fill="#3274d9" font-size="20" font-weight="700" text-anchor="middle">●</text>
<rect x="722" y="88" width="172" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="722" y="88" width="172" height="3" fill="#3274d9" rx="2"/>
<text x="730" y="106" fill="#d8d9da" font-size="11" font-weight="500">Total queued messages</text>
<text x="730" y="120" fill="#8e8e8e" font-size="9">stat · short</text>
<text x="808" y="222" fill="#3274d9" font-size="20" font-weight="700" text-anchor="middle">●</text>
<rect x="16" y="326" width="1056" height="26" fill="#22252b" rx="3"/>
<text x="26" y="345" fill="#d8d9da" font-size="12" font-weight="600">▾ Memory &amp; disk headroom</text>
<rect x="18" y="358" width="524" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="18" y="358" width="524" height="3" fill="#3274d9" rx="2"/>
<text x="26" y="376" fill="#d8d9da" font-size="11" font-weight="500">Memory used vs limit per node</text>
<text x="26" y="390" fill="#8e8e8e" font-size="9">timeseries · bytes</text>
<polyline points="28,488 112,474 196,488 280,474 364,488 448,474 532,488" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="546" y="358" width="524" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="546" y="358" width="524" height="3" fill="#3274d9" rx="2"/>
<text x="554" y="376" fill="#d8d9da" font-size="11" font-weight="500">Free disk vs limit per node</text>
<text x="554" y="390" fill="#8e8e8e" font-size="9">timeseries · bytes</text>
<polyline points="556,488 640,474 724,488 808,474 892,488 976,474 1060,488" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="16" y="596" width="1056" height="26" fill="#22252b" rx="3"/>
<text x="26" y="615" fill="#d8d9da" font-size="12" font-weight="600">▾ Connections, channels &amp; backlog</text>
<rect x="18" y="628" width="524" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="18" y="628" width="524" height="3" fill="#3274d9" rx="2"/>
<text x="26" y="646" fill="#d8d9da" font-size="11" font-weight="500">Connections &amp; channels</text>
<text x="26" y="660" fill="#8e8e8e" font-size="9">timeseries · short</text>
<polyline points="28,758 112,744 196,758 280,744 364,758 448,744 532,758" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="546" y="628" width="524" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="546" y="628" width="524" height="3" fill="#3274d9" rx="2"/>
<text x="554" y="646" fill="#d8d9da" font-size="11" font-weight="500">Total queued messages</text>
<text x="554" y="660" fill="#8e8e8e" font-size="9">timeseries · short</text>
<polyline points="556,758 640,744 724,758 808,744 892,758 976,744 1060,758" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="1088" y="56" width="284" height="810" fill="#181b1f" stroke="#2c3235" rx="4"/>
<text x="1100" y="78" fill="#d8d9da" font-size="12" font-weight="700">What to look for</text>
<circle cx="1106" cy="94" r="4" fill="#3274d9"/>
<text x="1118" y="98" fill="#8e8e8e" font-size="10">Is any node over its memory or disk</text>
<text x="1118" y="111" fill="#8e8e8e" font-size="10">watermark (alarm active = publishers</text>
<text x="1118" y="124" fill="#8e8e8e" font-size="10">blocked)?</text>
<circle cx="1106" cy="141" r="4" fill="#3274d9"/>
<text x="1118" y="145" fill="#8e8e8e" font-size="10">How close is each node to its memory and</text>
<text x="1118" y="158" fill="#8e8e8e" font-size="10">free-disk limits right now?</text>
<circle cx="1106" cy="175" r="4" fill="#3274d9"/>
<text x="1118" y="179" fill="#8e8e8e" font-size="10">Are all expected RabbitMQ nodes up and</text>
<text x="1118" y="192" fill="#8e8e8e" font-size="10">clustered?</text>
<circle cx="1106" cy="209" r="4" fill="#3274d9"/>
<text x="1118" y="213" fill="#8e8e8e" font-size="10">Is the total queued backlog growing</text>
<text x="1118" y="226" fill="#8e8e8e" font-size="10">across the cluster?</text>
<circle cx="1106" cy="243" r="4" fill="#73bf69"/>
<text x="1118" y="247" fill="#8e8e8e" font-size="10">Green: within expected range</text>
<circle cx="1106" cy="264" r="4" fill="#f2cc0c"/>
<text x="1118" y="268" fill="#8e8e8e" font-size="10">Yellow: investigate — approaching a</text>
<text x="1118" y="281" fill="#8e8e8e" font-size="10">limit</text>
<circle cx="1106" cy="298" r="4" fill="#e02f44"/>
<text x="1118" y="302" fill="#8e8e8e" font-size="10">Red: act now — threshold breached</text>
</svg>
