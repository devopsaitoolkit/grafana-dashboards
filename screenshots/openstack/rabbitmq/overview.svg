<text x="16" y="30" fill="#d8d9da" font-size="16" font-weight="600">OpenStack / RabbitMQ — Cluster Health</text>
<text x="16" y="48" fill="#8e8e8e" font-size="11">Schematic layout · datasource: prometheus · uid: openstack-rabbitmq-overview</text>
<rect x="16" y="56" width="1056" height="26" fill="#22252b" rx="3"/>
<text x="26" y="75" fill="#d8d9da" font-size="12" font-weight="600">▾ Cluster health — read these first</text>
<rect x="18" y="88" width="172" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
