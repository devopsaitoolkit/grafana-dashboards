<svg xmlns="http://www.w3.org/2000/svg" width="1404" height="1152" viewBox="0 0 1404 1152" font-family="Inter, Roboto, Arial, sans-serif">
<rect width="1404" height="1152" fill="#0b0c0e"/>
<text x="16" y="30" fill="#d8d9da" font-size="16" font-weight="600">Linux / Kernel</text>
<text x="16" y="48" fill="#8e8e8e" font-size="11">Schematic layout · datasource: prometheus · uid: linux-kernel</text>
<rect x="16" y="56" width="1056" height="26" fill="#22252b" rx="3"/>
<text x="26" y="75" fill="#d8d9da" font-size="12" font-weight="600">▾ Kernel limits — read these first</text>
