<text x="554" y="120" fill="#8e8e8e" font-size="9">stat · ops</text>
<text x="676" y="222" fill="#3274d9" font-size="20" font-weight="700" text-anchor="middle">●</text>
<rect x="810" y="88" width="260" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="810" y="88" width="260" height="3" fill="#3274d9" rx="2"/>
<text x="818" y="106" fill="#d8d9da" font-size="11" font-weight="500">Lowest entropy</text>
<text x="818" y="120" fill="#8e8e8e" font-size="9">stat · short</text>
<text x="940" y="222" fill="#3274d9" font-size="20" font-weight="700" text-anchor="middle">●</text>
<rect x="16" y="326" width="1056" height="26" fill="#22252b" rx="3"/>
<text x="26" y="345" fill="#d8d9da" font-size="12" font-weight="600">▾ Table headroom</text>
<rect x="18" y="358" width="524" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="18" y="358" width="524" height="3" fill="#3274d9" rx="2"/>
<text x="26" y="376" fill="#d8d9da" font-size="11" font-weight="500">File descriptors used % per host</text>
<text x="26" y="390" fill="#8e8e8e" font-size="9">timeseries · percent</text>
<polyline points="28,488 112,474 196,488 280,474 364,488 448,474 532,488" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="546" y="358" width="524" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="546" y="358" width="524" height="3" fill="#3274d9" rx="2"/>
<text x="554" y="376" fill="#d8d9da" font-size="11" font-weight="500">Conntrack used % per host</text>
<text x="554" y="390" fill="#8e8e8e" font-size="9">timeseries · percent</text>
<polyline points="556,488 640,474 724,488 808,474 892,488 976,474 1060,488" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="16" y="596" width="1056" height="26" fill="#22252b" rx="3"/>
<text x="26" y="615" fill="#d8d9da" font-size="12" font-weight="600">▾ Paging and scheduler</text>
<rect x="18" y="628" width="524" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="18" y="628" width="524" height="3" fill="#3274d9" rx="2"/>
<text x="26" y="646" fill="#d8d9da" font-size="11" font-weight="500">Major page faults per host</text>
<text x="26" y="660" fill="#8e8e8e" font-size="9">timeseries · ops</text>
<polyline points="28,758 112,744 196,758 280,744 364,758 448,744 532,758" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="546" y="628" width="524" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="546" y="628" width="524" height="3" fill="#3274d9" rx="2"/>
<text x="554" y="646" fill="#d8d9da" font-size="11" font-weight="500">Context switches per host</text>
<text x="554" y="660" fill="#8e8e8e" font-size="9">timeseries · ops</text>
<polyline points="556,758 640,744 724,758 808,744 892,758 976,744 1060,758" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="16" y="866" width="1056" height="26" fill="#22252b" rx="3"/>
<text x="26" y="885" fill="#d8d9da" font-size="12" font-weight="600">▾ Entropy</text>
<rect x="18" y="898" width="1052" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="18" y="898" width="1052" height="3" fill="#3274d9" rx="2"/>
<text x="26" y="916" fill="#d8d9da" font-size="11" font-weight="500">Available entropy per host</text>
<text x="26" y="930" fill="#8e8e8e" font-size="9">timeseries · short</text>
<polyline points="28,1028 200,1014 372,1028 544,1014 716,1028 888,1014 1060,1028" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="1088" y="56" width="284" height="1080" fill="#181b1f" stroke="#2c3235" rx="4"/>
<text x="1100" y="78" fill="#d8d9da" font-size="12" font-weight="700">What to look for</text>
<circle cx="1106" cy="94" r="4" fill="#3274d9"/>
<text x="1118" y="98" fill="#8e8e8e" font-size="10">Are we running out of file descriptors</text>
<text x="1118" y="111" fill="#8e8e8e" font-size="10">or conntrack entries?</text>
<circle cx="1106" cy="128" r="4" fill="#3274d9"/>
<text x="1118" y="132" fill="#8e8e8e" font-size="10">Is the kernel taking major page faults</text>
<text x="1118" y="145" fill="#8e8e8e" font-size="10">(working set spilling off RAM)?</text>
<circle cx="1106" cy="162" r="4" fill="#3274d9"/>
<text x="1118" y="166" fill="#8e8e8e" font-size="10">Is the context-switch rate abnormal</text>
<text x="1118" y="179" fill="#8e8e8e" font-size="10">(contention / oversubscription)?</text>
<circle cx="1106" cy="196" r="4" fill="#3274d9"/>
<text x="1118" y="200" fill="#8e8e8e" font-size="10">Is the entropy pool starved enough to</text>
<text x="1118" y="213" fill="#8e8e8e" font-size="10">block cryptographic operations?</text>
<circle cx="1106" cy="230" r="4" fill="#73bf69"/>
<text x="1118" y="234" fill="#8e8e8e" font-size="10">Green: within expected range</text>
<circle cx="1106" cy="251" r="4" fill="#f2cc0c"/>
<text x="1118" y="255" fill="#8e8e8e" font-size="10">Yellow: investigate — approaching a</text>
<text x="1118" y="268" fill="#8e8e8e" font-size="10">limit</text>
<circle cx="1106" cy="285" r="4" fill="#e02f44"/>
<text x="1118" y="289" fill="#8e8e8e" font-size="10">Red: act now — threshold breached</text>
</svg>
