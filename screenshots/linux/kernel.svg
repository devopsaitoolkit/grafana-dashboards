<text x="148" y="222" fill="#73bf69" font-size="20" font-weight="700" text-anchor="middle">●</text>
<rect x="282" y="88" width="260" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="282" y="88" width="260" height="3" fill="#73bf69" rx="2"/>
<text x="290" y="106" fill="#d8d9da" font-size="11" font-weight="500">Max conntrack used</text>
<text x="290" y="120" fill="#8e8e8e" font-size="9">gauge · percent</text>
<text x="412" y="222" fill="#73bf69" font-size="20" font-weight="700" text-anchor="middle">●</text>
<rect x="546" y="88" width="260" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="546" y="88" width="260" height="3" fill="#3274d9" rx="2"/>
