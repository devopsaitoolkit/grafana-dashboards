<text x="1100" y="78" fill="#d8d9da" font-size="12" font-weight="700">What to look for</text>
<circle cx="1106" cy="94" r="4" fill="#3274d9"/>
<text x="1118" y="98" fill="#8e8e8e" font-size="10">Which hosts are overloaded relative to</text>
<text x="1118" y="111" fill="#8e8e8e" font-size="10">their core count (load ÷ cores &gt; 1)?</text>
<circle cx="1106" cy="128" r="4" fill="#3274d9"/>
<text x="1118" y="132" fill="#8e8e8e" font-size="10">Is the backlog growing (load1 &gt; load5 &gt;</text>
<text x="1118" y="145" fill="#8e8e8e" font-size="10">load15) or draining?</text>
<circle cx="1106" cy="162" r="4" fill="#3274d9"/>
<text x="1118" y="166" fill="#8e8e8e" font-size="10">Are processes runnable (CPU-bound) or</text>
<text x="1118" y="179" fill="#8e8e8e" font-size="10">blocked (waiting on IO)?</text>
<circle cx="1106" cy="196" r="4" fill="#3274d9"/>
<text x="1118" y="200" fill="#8e8e8e" font-size="10">Is high load CPU contention or</text>
<text x="1118" y="213" fill="#8e8e8e" font-size="10">uninterruptible-sleep disk wait in</text>
<text x="1118" y="226" fill="#8e8e8e" font-size="10">disguise?</text>
<circle cx="1106" cy="243" r="4" fill="#73bf69"/>
<text x="1118" y="247" fill="#8e8e8e" font-size="10">Green: within expected range</text>
<circle cx="1106" cy="264" r="4" fill="#f2cc0c"/>
<text x="1118" y="268" fill="#8e8e8e" font-size="10">Yellow: investigate — approaching a</text>
<text x="1118" y="281" fill="#8e8e8e" font-size="10">limit</text>
<circle cx="1106" cy="298" r="4" fill="#e02f44"/>
<text x="1118" y="302" fill="#8e8e8e" font-size="10">Red: act now — threshold breached</text>
</svg>
