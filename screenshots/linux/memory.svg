<rect x="1088" y="56" width="284" height="1080" fill="#181b1f" stroke="#2c3235" rx="4"/>
<text x="1100" y="78" fill="#d8d9da" font-size="12" font-weight="700">What to look for</text>
<circle cx="1106" cy="94" r="4" fill="#3274d9"/>
<text x="1118" y="98" fill="#8e8e8e" font-size="10">Which hosts have the least available</text>
<text x="1118" y="111" fill="#8e8e8e" font-size="10">memory right now?</text>
<circle cx="1106" cy="128" r="4" fill="#3274d9"/>
<text x="1118" y="132" fill="#8e8e8e" font-size="10">How much of the resident set is</text>
<text x="1118" y="145" fill="#8e8e8e" font-size="10">reclaimable cache vs real anonymous</text>
<text x="1118" y="158" fill="#8e8e8e" font-size="10">demand?</text>
<circle cx="1106" cy="175" r="4" fill="#3274d9"/>
<text x="1118" y="179" fill="#8e8e8e" font-size="10">Is the host swapping, and how fast is it</text>
<text x="1118" y="192" fill="#8e8e8e" font-size="10">paging in/out?</text>
<circle cx="1106" cy="209" r="4" fill="#3274d9"/>
<text x="1118" y="213" fill="#8e8e8e" font-size="10">Are we taking major page faults or —</text>
<text x="1118" y="226" fill="#8e8e8e" font-size="10">worse — OOM-killing processes?</text>
<circle cx="1106" cy="243" r="4" fill="#73bf69"/>
<text x="1118" y="247" fill="#8e8e8e" font-size="10">Green: within expected range</text>
<circle cx="1106" cy="264" r="4" fill="#f2cc0c"/>
<text x="1118" y="268" fill="#8e8e8e" font-size="10">Yellow: investigate — approaching a</text>
<text x="1118" y="281" fill="#8e8e8e" font-size="10">limit</text>
<circle cx="1106" cy="298" r="4" fill="#e02f44"/>
<text x="1118" y="302" fill="#8e8e8e" font-size="10">Red: act now — threshold breached</text>
</svg>
