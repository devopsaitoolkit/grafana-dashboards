<polyline points="28,1028 112,1014 196,1028 280,1014 364,1028 448,1014 532,1028" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="546" y="898" width="524" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
