<text x="26" y="885" fill="#d8d9da" font-size="12" font-weight="600">▾ Faults and OOM</text>
<rect x="18" y="898" width="524" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="18" y="898" width="524" height="3" fill="#3274d9" rx="2"/>
