<polyline points="556,758 640,744 724,758 808,744 892,758 976,744 1060,758" fill="none" stroke="#3274d9" stroke-width="1.5" opacity="0.8"/>
<rect x="16" y="866" width="1056" height="26" fill="#22252b" rx="3"/>
<text x="26" y="885" fill="#d8d9da" font-size="12" font-weight="600">▾ Busiest devices</text>
<rect x="18" y="898" width="1052" height="234" fill="#181b1f" stroke="#2c3235" rx="3"/>
<rect x="18" y="898" width="1052" height="3" fill="#f2cc0c" rx="2"/>
<text x="26" y="916" fill="#d8d9da" font-size="11" font-weight="500">Top devices by %util</text>
<text x="26" y="930" fill="#8e8e8e" font-size="9">bargauge · percent</text>
<rect x="28" y="1016" width="516" height="5" fill="#f2cc0c" opacity="0.70" rx="2"/>
<rect x="28" y="1025" width="671" height="5" fill="#f2cc0c" opacity="0.55" rx="2"/>
<rect x="28" y="1034" width="826" height="5" fill="#f2cc0c" opacity="0.40" rx="2"/>
<rect x="1088" y="56" width="284" height="1080" fill="#181b1f" stroke="#2c3235" rx="4"/>
<text x="1100" y="78" fill="#d8d9da" font-size="12" font-weight="700">What to look for</text>
<circle cx="1106" cy="94" r="4" fill="#3274d9"/>
<text x="1118" y="98" fill="#8e8e8e" font-size="10">Which device is busiest (%util) right</text>
<text x="1118" y="111" fill="#8e8e8e" font-size="10">now?</text>
<circle cx="1106" cy="128" r="4" fill="#3274d9"/>
<text x="1118" y="132" fill="#8e8e8e" font-size="10">Is the disk latency- or throughput-bound</text>
<text x="1118" y="145" fill="#8e8e8e" font-size="10">— high await or high MB/s?</text>
<circle cx="1106" cy="162" r="4" fill="#3274d9"/>
<text x="1118" y="166" fill="#8e8e8e" font-size="10">How are reads and writes split, in IOPS</text>
<text x="1118" y="179" fill="#8e8e8e" font-size="10">and bytes?</text>
<circle cx="1106" cy="196" r="4" fill="#3274d9"/>
<text x="1118" y="200" fill="#8e8e8e" font-size="10">Is the IO queue backing up (weighted IO</text>
<text x="1118" y="213" fill="#8e8e8e" font-size="10">time climbing faster than wall time)?</text>
<circle cx="1106" cy="230" r="4" fill="#73bf69"/>
<text x="1118" y="234" fill="#8e8e8e" font-size="10">Green: within expected range</text>
<circle cx="1106" cy="251" r="4" fill="#f2cc0c"/>
<text x="1118" y="255" fill="#8e8e8e" font-size="10">Yellow: investigate — approaching a</text>
<text x="1118" y="268" fill="#8e8e8e" font-size="10">limit</text>
<circle cx="1106" cy="285" r="4" fill="#e02f44"/>
<text x="1118" y="289" fill="#8e8e8e" font-size="10">Red: act now — threshold breached</text>
</svg>
